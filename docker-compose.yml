name: clearml

services:

  apiserver:
    hostname: apiserver
    command: [apiserver]
    container_name: clearml-apiserver
    image: allegroai/clearml:2.0.0
    restart: unless-stopped
    volumes:
      - logs:/var/log/clearml
      - ./clearml_config:/opt/clearml/config
      - data_fileserver:/mnt/fileserver
    depends_on:
      - redis
      - mongo
      - elasticsearch
      - fileserver
    environment:
      CLEARML_ELASTIC_SERVICE_HOST: elasticsearch
      CLEARML_ELASTIC_SERVICE_PORT: 9200
      CLEARML_MONGODB_SERVICE_HOST: mongo
      CLEARML_MONGODB_SERVICE_PORT: 27017
      CLEARML_REDIS_SERVICE_HOST: redis
      CLEARML_REDIS_SERVICE_PORT: 6379
      CLEARML_SERVER_DEPLOYMENT_TYPE: linux
      CLEARML__apiserver__files__default_storage__fileserver: "http://fileserver:8081"
      CLEARML__apiserver__files__default_storage__base_url: "http://fileserver:8081"
      CLEARML__apiserver__pre_populate__enabled: "true"
      CLEARML__apiserver__pre_populate__zip_files: "/opt/clearml/db-pre-populate"
      CLEARML__apiserver__pre_populate__artifacts_path: "/mnt/fileserver"
      CLEARML__services__async_urls_delete__enabled: "true"
      CLEARML__services__async_urls_delete__fileserver__url_prefixes: "[http://fileserver:8081]"
      # Credentials for the agent-services container (filled in after clearml-init)
      CLEARML__secure__credentials__services_agent__user_key: ${CLEARML_AGENT_ACCESS_KEY:-}
      CLEARML__secure__credentials__services_agent__user_secret: ${CLEARML_AGENT_SECRET_KEY:-}
    ports:
      - "8008:8008"
    networks:
      - backend
      - frontend

  fileserver:
    hostname: fileserver
    command: [fileserver]
    container_name: clearml-fileserver
    image: allegroai/clearml:2.0.0
    restart: unless-stopped
    volumes:
      - logs:/var/log/clearml
      - data_fileserver:/mnt/fileserver
      - ./clearml_config:/opt/clearml/config
    environment:
      CLEARML__fileserver__delete__allow_batch: "true"
    ports:
      - "8081:8081"
    networks:
      - backend
      - frontend

  webserver:
    hostname: webserver
    command: [webserver]
    container_name: clearml-webserver
    image: allegroai/clearml:2.0.0
    restart: unless-stopped
    environment:
      CLEARML__apiserver__files__default_storage__fileserver: "http://fileserver:8081"
    depends_on:
      - apiserver
    ports:
      - "8080:80"
    networks:
      - frontend

  async_delete:
    container_name: async_delete
    image: allegroai/clearml:2.0.0
    restart: unless-stopped
    depends_on:
      - apiserver
      - redis
      - mongo
      - elasticsearch
      - fileserver
    environment:
      CLEARML_ELASTIC_SERVICE_HOST: elasticsearch
      CLEARML_ELASTIC_SERVICE_PORT: 9200
      CLEARML_MONGODB_SERVICE_HOST: mongo
      CLEARML_MONGODB_SERVICE_PORT: 27017
      CLEARML_REDIS_SERVICE_HOST: redis
      CLEARML_REDIS_SERVICE_PORT: 6379
      PYTHONPATH: /opt/clearml/apiserver
      CLEARML__services__async_urls_delete__fileserver__url_prefixes: "[http://fileserver:8081]"
    entrypoint:
      - python3
      - -m
      - jobs.async_urls_delete
      - --fileserver-host
      - http://fileserver:8081
    volumes:
      - logs:/var/log/clearml
      - ./clearml_config:/opt/clearml/config
    networks:
      - backend

  # ── Inference + UI ────────────────────────────────────────────────────────
  serving:
    build:
      context: .
      dockerfile: Dockerfile.serving
    container_name: clearml-serving
    restart: unless-stopped
    environment:
      CLEARML_SERVING_TASK_ID: ${CLEARML_SERVING_TASK_ID}
      CLEARML_API_HOST: http://apiserver:8008
      CLEARML_WEB_HOST: http://webserver:80
      CLEARML_FILES_HOST: http://${SERVER_HOST}:8081
      CLEARML_API_ACCESS_KEY: ${CLEARML_API_ACCESS_KEY}
      CLEARML_API_SECRET_KEY: ${CLEARML_API_SECRET_KEY}
    ports:
      - "8082:8082"
    depends_on:
      - apiserver
    networks:
      - backend
      - frontend

  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    container_name: clearml-ui
    restart: unless-stopped
    environment:
      SERVING_URL: http://serving:8082/serve/sentiment
    ports:
      - "8501:8501"
    depends_on:
      - serving
    networks:
      - frontend

  # ── Agent ─────────────────────────────────────────────────────────────────
  # Uncomment AFTER running: source .env  (see .env.example)
  # agent-services:
  #   container_name: clearml-agent-services
  #   image: allegroai/clearml-agent-services:services-1.3.0-80
  #   deploy:
  #     restart_policy:
  #       condition: on-failure
  #   privileged: true
  #   network_mode: "host"
  #   environment:
  #     CLEARML_HOST_IP: host.docker.internal
  #     CLEARML_WEB_HOST: http://localhost:8080
  #     CLEARML_API_HOST: http://localhost:8008
  #     CLEARML_FILES_HOST: http://localhost:8081
  #     CLEARML_API_ACCESS_KEY: ${CLEARML_AGENT_ACCESS_KEY}
  #     CLEARML_API_SECRET_KEY: ${CLEARML_AGENT_SECRET_KEY}
  #     CLEARML_AGENT_GIT_USER: ${CLEARML_AGENT_GIT_USER}
  #     CLEARML_AGENT_GIT_PASS: ${CLEARML_AGENT_GIT_PASS}
  #     CLEARML_AGENT_UPDATE_VERSION: "==1.9.2"
  #     CLEARML_AGENT_DEFAULT_BASE_DOCKER: "python:3.11-slim"
  #     CLEARML_WORKER_ID: "clearml-services"
  #     SHUTDOWN_IF_NO_ACCESS_KEY: 1
  #   volumes:
  #     - /var/run/docker.sock:/var/run/docker.sock
  #     - clearml_agent:/root/.clearml
  #   depends_on:
  #     - apiserver
  #   entrypoint: >
  #     bash -c "curl --retry 10 --retry-delay 10 --retry-connrefused
  #     'http://localhost:8008/debug.ping' && /usr/agent/entrypoint.sh"

  # ── Databases ─────────────────────────────────────────────────────────────
  mongo:
    container_name: clearml-mongo
    image: mongo:6.0
    restart: unless-stopped
    command: --setParameter internalQueryMaxBlockingSortMemoryUsageBytes=196100200
    volumes:
      - mongo_db:/data/db
      - mongo_configdb:/data/configdb
    networks:
      - backend

  elasticsearch:
    container_name: clearml-elastic
    image: elasticsearch:7.17.6
    restart: unless-stopped
    environment:
      bootstrap.memory_lock: "true"
      cluster.name: clearml
      discovery.type: single-node
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
      xpack.security.enabled: "false"
      cluster.routing.allocation.disk.watermark.low: 500mb
      cluster.routing.allocation.disk.watermark.high: 500mb
      cluster.routing.allocation.disk.watermark.flood_stage: 500mb
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - data_elastic:/usr/share/elasticsearch/data
    networks:
      - backend

  redis:
    container_name: clearml-redis
    image: redis:6.2
    restart: unless-stopped
    volumes:
      - data_redis:/data
    networks:
      - backend

volumes:
  logs:
    name: clearml_logs
  data_fileserver:
    name: clearml_data_fileserver
  data_redis:
    name: clearml_data_redis
  data_elastic:
    name: clearml_data_elastic
  mongo_db:
    name: clearml_mongo_db
  mongo_configdb:
    name: clearml_mongo_configdb
  clearml_agent:
    name: clearml_clearml_agent

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
